<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <title>Intro Canvas 2D</title>
    <link rel="icon" type="image/png" href="assets/img/favicon(2).png">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🎨 Canvas 2D Pro</a>
        </div>
    </nav>

    <main class="container flex-grow-1 mt-4 mb-5 shadow-lg rounded-4 p-4 p-md-5 main-container">
        
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark">Objetos 2D mediante OOP</h1>
            <p class="text-muted">Explorando la programación orientada a objetos con HTML5 Canvas</p>
            <hr class="w-25 mx-auto divider-custom">
        </div>

        <div class="row g-4 justify-content-around">
            
            <div class="col-12 col-md-4 d-flex flex-column align-items-center">
                <div class="canvas-card p-4 rounded-3 shadow-sm w-100 d-flex flex-column align-items-center">
                    <h5 class="fw-semibold text-secondary mb-3">Objeto 2D</h5>
                    <canvas class="border shadow-sm" id="canvasOOP"></canvas>
                </div>
            </div>

            <div class="col-12 col-md-4 d-flex flex-column align-items-center">
                <div class="canvas-card p-4 rounded-3 shadow-sm w-100 d-flex flex-column align-items-center">
                    <h5 class="fw-semibold text-secondary mb-3">Objeto con Random</h5>
                    <canvas class="border shadow-sm" id="canvasRandom"></canvas>
                </div>
            </div>

            <div class="col-12 col-md-4 d-flex flex-column align-items-center">
                <div class="canvas-card p-4 rounded-3 shadow-sm w-100 d-flex flex-column align-items-center">
                    <h5 class="fw-semibold text-secondary mb-3">Múltiples objetos</h5>
                    <canvas class="border shadow-sm" id="canvasMultiple"></canvas>
                </div>
            </div>

        </div>

    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-1">Desarrollado con ☕ y código por <span class="fw-bold text-info">Leonardo Gutiérrez</span></p>
            <p class="mb-0 text-muted small">Ingeniería en Sistemas | Instituto Tecnológico de Pachuca &copy; 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
